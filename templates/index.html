<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRE Commander | Vectorized Analysis</title>
    
    <!-- External Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
        }
        .glow-btn:hover {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
        }
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
        
        /* Markdown override for results */
        #analysis-result h1 { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; color: #60a5fa; }
        #analysis-result h2 { font-size: 1.25rem; font-weight: bold; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #93c5fd; }
        #analysis-result h3 { font-size: 1.1rem; font-weight: bold; margin-top: 1rem; color: #cbd5e1; }
        #analysis-result p { margin-bottom: 1rem; color: #cbd5e1; line-height: 1.6; }
        #analysis-result ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        #analysis-result li { margin-bottom: 0.5rem; color: #94a3b8; }
        #analysis-result code { background: rgba(255, 255, 255, 0.1); padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-100 overflow-x-hidden min-h-screen">
    <!-- Ambient Background -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-600/10 blur-[120px] rounded-full"></div>
    </div>

    <!-- Main Content -->
    <main class="relative z-10 py-12 px-4 sm:px-6 lg:px-12">
        <div class="max-w-4xl mx-auto">
            <!-- Header -->
            <header class="text-center mb-12 animate-fade-in">
                <div class="inline-flex items-center px-4 py-1.5 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-sm font-bold mb-6">
                    <span class="flex h-2 w-2 rounded-full bg-blue-500 mr-2 animate-pulse"></span>
                    VECTORIZED SRE COMMANDER
                </div>
                <h1 class="text-5xl sm:text-6xl font-bold tracking-tight text-white mb-6">
                    Hindsight <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">Analyzer</span>
                </h1>
                <p class="text-slate-400 text-lg">Next-gen incident response powered by Vectorize.io</p>
            </header>

            <!-- Input Console -->
            <div class="glass-panel p-8 mb-8 animate-fade-in">
                <div class="flex items-center justify-between mb-4">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">Diagnostic Input</label>
                    <span class="text-[10px] text-slate-500 font-mono">Real-time Vector Search Enabled</span>
                </div>
                <textarea id="incident-input" class="w-full h-40 px-6 py-4 bg-slate-900/50 border border-white/5 rounded-2xl text-slate-200 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500/40 transition-all resize-none font-mono text-sm" placeholder="Paste logs, alerts, or symptoms..."></textarea>
                <div class="mt-6">
                    <button id="analyze-btn" class="glow-btn w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-500/20 text-lg">
                        Analyze with Global Hindsight
                    </button>
                </div>
            </div>

            <!-- Loading Spinner -->
            <div id="loading-state" class="hidden py-12 text-center animate-fade-in">
                <div class="w-16 h-16 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mx-auto"></div>
                <p class="mt-6 text-slate-400 font-medium">Querying Vector Banks & Generating Resolution...</p>
            </div>

            <!-- Results Section -->
            <div id="results-section" class="hidden space-y-6 animate-fade-in">
                <div class="glass-panel p-8">
                    <div class="flex items-center justify-between mb-8 border-b border-white/5 pb-4">
                        <h2 class="text-2xl font-bold text-white flex items-center gap-3">
                            <i class="fas fa-microchip text-blue-400"></i> AI Intelligence Report
                        </h2>
                        <span id="match-badge" class="px-3 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-xs font-bold"></span>
                    </div>
                    <div id="analysis-result" class="prose prose-invert max-w-none">
                        <!-- AI Response injected here -->
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <button id="new-analysis-btn" class="bg-slate-800 text-slate-300 font-bold py-4 px-8 rounded-xl border border-white/5 hover:bg-slate-700 transition-all">
                        Reset Workspace
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
